<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rubric Row Feedback</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 14px; }
    h1 { margin: 0 0 8px; font-size: 18px; }
    p { margin: 6px 0 10px; max-width: 1200px; color: #cfcfcf; font-size: 13px; line-height: 1.35; }

    textarea, select, button { font: inherit; }
    #input { width: 100%; max-width: 1200px; border: 1px solid #2a2a2a; border-radius: 10px; padding: 10px; background: #0b0b0b; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 10px; }
    button { padding: 7px 10px; border-radius: 10px; border: 1px solid #2a2a2a; background: #121212; cursor: pointer; }
    button:hover { background: #171717; }
    .status { margin: 10px 0 0; color: #bfbfbf; font-size: 13px; }
    .footerStats { margin-top: 10px; color: #bfbfbf; font-size: 13px; }
    .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; border: 1px solid #2a2a2a; background: #0b0b0b; font-size: 11px; color: #d6d6d6; }

    .tableWrap { margin-top: 12px; overflow: auto; border: 1px solid #242424; border-radius: 12px; }
    table { border-collapse: collapse; width: 100%; min-width: 1280px; }
    th, td { border-bottom: 1px solid #1f1f1f; padding: 8px; vertical-align: top; }
    th { position: sticky; top: 0; background: #101010; text-align: left; font-weight: 600; font-size: 12px; color: #d6d6d6; }
    td { font-size: 12px; color: #d6d6d6; }
    tr:nth-child(even) td { background: #0e0e0e; }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .fbCell { min-width: 190px; }
    .fbTop { display: flex; gap: 6px; align-items: center; }
    .sel { width: 120px; border-radius: 10px; border: 1px solid #2a2a2a; background: #0b0b0b; padding: 6px 8px; font-size: 12px; }
    .why { margin-top: 6px; display: none; }
    .why textarea {
      width: 100%;
      min-height: 52px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #0b0b0b;
      padding: 6px 8px;
      font-size: 12px;
      box-sizing: border-box;
    }
    .wFix { margin-left: auto; display: none; gap: 6px; align-items: center; }
    .wFix .sel { width: 120px; }
    .label { font-size: 11px; color: #a9a9a9; }

    .reqOutline { border-color: #b88a2a !important; outline: 2px solid rgba(184,138,42,0.2); }
    .rowErr td { box-shadow: inset 0 0 0 9999px rgba(184,42,42,0.07); }

    /* Dependency highlighting */
    tr.hlBase td { box-shadow: inset 0 0 0 9999px rgba(184,138,42,0.10); }
    tr.hlRelated td { box-shadow: inset 0 0 0 9999px rgba(60,140,255,0.10); }
    tr.hlCascade td { box-shadow: inset 0 0 0 9999px rgba(60,140,255,0.06); }
  </style>
</head>
<body>
  <h1>Rubric Row Feedback</h1>
  <p>
    Paste TSV rows, Parse, then fill out each field.
    “Why” only appears when you select <span class="pill">bad</span>.
    “Works in app” must be set for every row. Hover a row to highlight its dependency cascade.
  </p>

  <textarea id="input" rows="8" placeholder="Paste rows here (tab-separated is best)"></textarea>

  <div class="controls">
    <button id="parseBtn">Parse</button>
    <button id="saveBtn">Save</button>
    <button id="loadBtn">Load Saved</button>
    <button id="clearBtn">Clear Saved</button>
    <button id="exportBtn">Export CSV</button>
  </div>

  <div id="status" class="status"></div>

  <div id="tableWrap" class="tableWrap"></div>

  <div id="footerStats" class="footerStats"></div>

<script>
(function () {
  const LS_KEY = "rubric_feedback_v5";

  const els = {
    input: document.getElementById("input"),
    parseBtn: document.getElementById("parseBtn"),
    saveBtn: document.getElementById("saveBtn"),
    loadBtn: document.getElementById("loadBtn"),
    clearBtn: document.getElementById("clearBtn"),
    exportBtn: document.getElementById("exportBtn"),
    status: document.getElementById("status"),
    tableWrap: document.getElementById("tableWrap"),
    footerStats: document.getElementById("footerStats"),
  };

  // verdict: "" | "good" | "bad"
  // works: "" | "yes" | "no"
  let model = { rows: [] };

  // Dependency maps (rebuilt on render/parse)
  let byId = new Map();              // id -> rowIndex
  let depsForward = new Map();       // id -> Set(depId) (this row depends on depId)
  let depsReverse = new Map();       // id -> Set(childId) (rows that depend on this id)

  function setStatus(msg) { els.status.textContent = msg || ""; }
  function safeTrim(s) { return (s == null) ? "" : String(s).trim(); }

  function splitLine(line) {
    let parts = line.split(/\t+/).map(safeTrim).filter(x => x !== "");
    if (parts.length < 5) parts = line.split(/ {2,}/).map(safeTrim).filter(x => x !== "");
    return parts;
  }

  function makeRow({ id, tag, description, weight, rationality, dep }) {
    const w = (String(weight || "").toLowerCase() === "minor") ? "minor" : "major";
    return {
      id: safeTrim(id),
      tag: safeTrim(tag),
      description: safeTrim(description),
      weight: w,
      rationality: safeTrim(rationality),
      dep: safeTrim(dep),
      worksInApp: "", // "" | "yes" | "no"
      fb: {
        tag: { verdict: "", why: "" },
        description: { verdict: "", why: "" },
        weight: { verdict: "", why: "", corrected: "" },
        rationality: { verdict: "", why: "" },
      }
    };
  }

  function parseInput(text) {
    const lines = String(text || "")
      .replace(/\r\n/g, "\n").replace(/\r/g, "\n")
      .split("\n").map(l => l.trim()).filter(l => l.length > 0);

    const rows = [];
    for (const line of lines) {
      const parts = splitLine(line);
      if (parts.length < 5) continue;

      const id = safeTrim(parts[0]);
      const tag = safeTrim(parts[1]);

      let description = safeTrim(parts[2]);
      let weight = safeTrim(parts[3]).toLowerCase();
      let rationality = safeTrim(parts[4]);
      let dep = safeTrim(parts[5] || "");

      if (parts.length > 6) {
        // Attempt messy-line recovery: id tag [description...] weight rationality [dep]
        const last = parts[parts.length - 1];
        const secondLast = parts[parts.length - 2];
        const thirdLast = parts[parts.length - 3];
        const w = (thirdLast || "").toLowerCase();
        if (w === "major" || w === "minor") {
          description = parts.slice(2, parts.length - 3).join(" ");
          weight = w;
          rationality = secondLast;
          dep = last;
        }
      }

      rows.push(makeRow({ id, tag, description, weight, rationality, dep }));
    }
    return rows;
  }

  function autoSave() { try { localStorage.setItem(LS_KEY, JSON.stringify(model)); } catch (_) {} }

  function saveToLocalStorage() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(model)); setStatus("Saved locally."); }
    catch (e) { setStatus("Save failed: " + (e && e.message ? e.message : String(e))); }
  }

  function loadFromLocalStorage() {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) { setStatus("No saved data found."); return; }
    try {
      const loaded = JSON.parse(raw);
      if (!loaded || !Array.isArray(loaded.rows)) { setStatus("Saved data is invalid."); return; }
      model = loaded;

      // normalize older saves
      model.rows.forEach(r => {
        if (typeof r.worksInApp !== "string") r.worksInApp = "";
        if (typeof r.dep !== "string") r.dep = "";
        if (!r.fb) r.fb = {};
        if (!r.fb.tag) r.fb.tag = { verdict: "", why: "" };
        if (!r.fb.description) r.fb.description = { verdict: "", why: "" };
        if (!r.fb.rationality) r.fb.rationality = { verdict: "", why: "" };
        if (!r.fb.weight) r.fb.weight = { verdict: "", why: "", corrected: "" };
        if (typeof r.fb.weight.corrected !== "string") r.fb.weight.corrected = "";
      });

      setStatus("Loaded saved data.");
      render();
      validateAll();
      updateStats();
    } catch (e) {
      setStatus("Load failed: " + (e && e.message ? e.message : String(e)));
    }
  }

  function clearLocalStorage() { localStorage.removeItem(LS_KEY); setStatus("Cleared saved data."); updateStats(); }

  function escapeCsv(v) {
    const s = String(v == null ? "" : v);
    const needs = /[",\n]/.test(s);
    const doubled = s.replace(/"/g, '""');
    return needs ? `"${doubled}"` : doubled;
  }

  function download(filename, text) {
    const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function validateRow(row) {
    const issues = [];

    if (row.worksInApp !== "yes" && row.worksInApp !== "no") {
      issues.push({ field: "worksInApp", type: "needsWorks" });
    }

    const fields = ["tag","description","weight","rationality"];
    for (const f of fields) {
      const verdict = row.fb[f].verdict || "";
      if (verdict !== "good" && verdict !== "bad") {
        issues.push({ field: f, type: "needsVerdict" });
        continue;
      }
      if (verdict === "bad") {
        const why = (row.fb[f].why || "").trim();
        if (!why) issues.push({ field: f, type: "needsWhy" });
      }
    }

    if (row.fb.weight.verdict === "bad") {
      const c = (row.fb.weight.corrected || "").trim().toLowerCase();
      if (c !== "major" && c !== "minor") issues.push({ field: "weight", type: "needsCorrected" });
    }

    return issues;
  }

  function validateAll() {
    let total = 0;
    const rowEls = els.tableWrap.querySelectorAll("tbody tr");
    rowEls.forEach(tr => tr.classList.remove("rowErr"));

    model.rows.forEach((row, idx) => {
      const issues = validateRow(row);
      total += issues.length;

      const tr = rowEls[idx];
      if (!tr) return;

      tr.querySelectorAll(".reqOutline").forEach(el => el.classList.remove("reqOutline"));
      if (issues.length) tr.classList.add("rowErr");

      issues.forEach(issue => {
        const key = issue.field + "_" + issue.type;
        const target = tr.querySelector('[data-issue="' + key + '"]');
        if (target) target.classList.add("reqOutline");
      });
    });

    return total;
  }

  function updateStats() {
    const total = model.rows.length;
    const yes = model.rows.filter(r => r.worksInApp === "yes").length;
    const no = model.rows.filter(r => r.worksInApp === "no").length;
    const filled = yes + no;

    if (!total) { els.footerStats.textContent = ""; return; }

    const yesPct = Math.round((yes / total) * 100);
    const noPct = Math.round((no / total) * 100);
    const filledPct = Math.round((filled / total) * 100);

    els.footerStats.textContent =
      "Works in app: " +
      yes + " yes (" + yesPct + "%), " +
      no + " no (" + noPct + "%). " +
      "Populated: " + filled + "/" + total + " (" + filledPct + "%).";
  }

  function exportCsv() {
    if (!model.rows.length) { setStatus("Nothing to export."); return; }
    const errs = validateAll();
    if (errs > 0) { setStatus("Fix required fields before export (" + errs + " issues highlighted)."); return; }

    const headers = [
      "id","tag","description","weight","rationality","dep",
      "works_in_app",
      "tag_verdict","tag_why",
      "description_verdict","description_why",
      "weight_verdict","weight_why","weight_corrected",
      "rationality_verdict","rationality_why"
    ];

    const lines = [headers.map(escapeCsv).join(",")];
    for (const r of model.rows) {
      lines.push([
        r.id, r.tag, r.description, r.weight, r.rationality, r.dep,
        r.worksInApp,
        r.fb.tag.verdict, r.fb.tag.why,
        r.fb.description.verdict, r.fb.description.why,
        r.fb.weight.verdict, r.fb.weight.why, r.fb.weight.corrected,
        r.fb.rationality.verdict, r.fb.rationality.why
      ].map(escapeCsv).join(","));
    }

    download("rubric_feedback.csv", lines.join("\n"));
    setStatus("Exported CSV.");
  }

  function buildDepMaps() {
    byId = new Map();
    depsForward = new Map();
    depsReverse = new Map();

    model.rows.forEach((r, idx) => {
      if (r.id) byId.set(String(r.id), idx);
    });

    function addToMapSet(map, key, val) {
      if (!map.has(key)) map.set(key, new Set());
      map.get(key).add(val);
    }

    model.rows.forEach(r => {
      const id = String(r.id || "");
      if (!id) return;

      // dep can be: "15855" or "15855, 15864" or "15855 15864"
      const depRaw = String(r.dep || "");
      const depIds = depRaw
        .split(/[^0-9]+/g)      // keep numeric chunks
        .map(s => s.trim())
        .filter(s => s.length > 0);

      depsForward.set(id, new Set(depIds));

      depIds.forEach(d => {
        addToMapSet(depsReverse, d, id); // d -> child id
      });
    });
  }

  function clearHighlights() {
    els.tableWrap.querySelectorAll("tbody tr").forEach(tr => {
      tr.classList.remove("hlBase","hlRelated","hlCascade");
    });
  }

  // On hover: highlight base row, all ancestors (its deps recursively),
  // and all descendants (rows that depend on it recursively).
  function computeCascade(baseId) {
    const ancestors = new Set();
    const descendants = new Set();

    // ancestors: follow forward deps recursively
    const stackA = [baseId];
    const seenA = new Set([baseId]);
    while (stackA.length) {
      const cur = stackA.pop();
      const deps = depsForward.get(cur);
      if (!deps) continue;
      for (const d of deps) {
        if (!d || seenA.has(d)) continue;
        seenA.add(d);
        ancestors.add(d);
        stackA.push(d);
      }
    }

    // descendants: follow reverse deps recursively
    const stackD = [baseId];
    const seenD = new Set([baseId]);
    while (stackD.length) {
      const cur = stackD.pop();
      const kids = depsReverse.get(cur);
      if (!kids) continue;
      for (const k of kids) {
        if (!k || seenD.has(k)) continue;
        seenD.add(k);
        descendants.add(k);
        stackD.push(k);
      }
    }

    return { ancestors, descendants };
  }

  function applyCascadeHighlight(baseId) {
    clearHighlights();

    const tbody = els.tableWrap.querySelector("tbody");
    if (!tbody) return;

    const baseIdx = byId.get(String(baseId));
    if (baseIdx == null) return;

    const rowsEls = tbody.querySelectorAll("tr");
    const baseTr = rowsEls[baseIdx];
    if (baseTr) baseTr.classList.add("hlBase");

    const { ancestors, descendants } = computeCascade(String(baseId));

    // Direct neighbors (immediate deps and immediate children) get "hlRelated"
    const directDeps = depsForward.get(String(baseId)) || new Set();
    const directKids = depsReverse.get(String(baseId)) || new Set();

    function mark(id, cls) {
      const idx = byId.get(String(id));
      if (idx == null) return;
      const tr = rowsEls[idx];
      if (tr) tr.classList.add(cls);
    }

    directDeps.forEach(d => mark(d, "hlRelated"));
    directKids.forEach(k => mark(k, "hlRelated"));

    // Everything else in the cascade gets "hlCascade"
    ancestors.forEach(a => { if (!directDeps.has(a)) mark(a, "hlCascade"); });
    descendants.forEach(d => { if (!directKids.has(d)) mark(d, "hlCascade"); });
  }

  function render() {
    if (!model.rows.length) { els.tableWrap.innerHTML = ""; updateStats(); return; }

    buildDepMaps();

    const table = document.createElement("table");

    const thead = document.createElement("thead");
    const hr = document.createElement("tr");
    ["id","tag","description","weight","rationality","dep","works in app","tag fb","desc fb","weight fb","rational fb"].forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");

    model.rows.forEach((row, idx) => {
      const tr = document.createElement("tr");
      tr.dataset.rowId = String(row.id || "");

      // Hover highlight cascade
      tr.addEventListener("mouseenter", () => {
        const id = tr.dataset.rowId;
        if (id) applyCascadeHighlight(id);
      });
      tr.addEventListener("mouseleave", () => {
        clearHighlights();
      });

      tr.appendChild(tdText(row.id, true));
      tr.appendChild(tdText(row.tag));
      tr.appendChild(tdText(row.description));
      tr.appendChild(tdText(row.weight));
      tr.appendChild(tdText(row.rationality));
      tr.appendChild(tdText(row.dep));

      tr.appendChild(tdWorks(idx));
      tr.appendChild(tdFbCell(idx, "tag"));
      tr.appendChild(tdFbCell(idx, "description"));
      tr.appendChild(tdFbCell(idx, "weight", true));
      tr.appendChild(tdFbCell(idx, "rationality"));

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    els.tableWrap.innerHTML = "";
    els.tableWrap.appendChild(table);
    updateStats();
  }

  function tdText(v, mono) {
    const td = document.createElement("td");
    if (mono) td.className = "mono";
    td.textContent = v;
    return td;
  }

  function makeSelect(options, current) {
    const sel = document.createElement("select");
    sel.className = "sel";
    options.forEach(([value, label]) => {
      const o = document.createElement("option");
      o.value = value;
      o.textContent = label;
      sel.appendChild(o);
    });
    sel.value = current || "";
    return sel;
  }

  function tdWorks(rowIndex) {
    const td = document.createElement("td");
    td.className = "fbCell";

    const sel = makeSelect(
      [["","Select one"],["yes","yes"],["no","no"]],
      model.rows[rowIndex].worksInApp
    );
    sel.setAttribute("data-issue", "worksInApp_needsWorks");

    sel.addEventListener("change", () => {
      model.rows[rowIndex].worksInApp = sel.value;
      autoSave();
      validateAll();
      updateStats();
    });

    td.appendChild(sel);
    return td;
  }

  function tdFbCell(rowIndex, field, isWeight) {
    const td = document.createElement("td");
    td.className = "fbCell";

    const top = document.createElement("div");
    top.className = "fbTop";

    const sel = makeSelect(
      [["","Select one"],["good","good"],["bad","bad"]],
      model.rows[rowIndex].fb[field].verdict
    );
    sel.setAttribute("data-issue", field + "_needsVerdict");

    const wFix = document.createElement("div");
    wFix.className = "wFix";

    if (isWeight) {
      const lab = document.createElement("span");
      lab.className = "label";
      lab.textContent = "fix:";
      const fixSel = makeSelect(
        [["","Select one"],["major","major"],["minor","minor"]],
        model.rows[rowIndex].fb.weight.corrected
      );
      fixSel.setAttribute("data-issue", "weight_needsCorrected");

      fixSel.addEventListener("change", () => {
        model.rows[rowIndex].fb.weight.corrected = fixSel.value;
        autoSave();
        validateAll();
      });

      wFix.appendChild(lab);
      wFix.appendChild(fixSel);
    }

    top.appendChild(sel);
    if (isWeight) top.appendChild(wFix);

    const whyWrap = document.createElement("div");
    whyWrap.className = "why";
    const why = document.createElement("textarea");
    why.placeholder = "why";
    why.value = model.rows[rowIndex].fb[field].why || "";
    why.setAttribute("data-issue", field + "_needsWhy");
    why.addEventListener("input", () => {
      model.rows[rowIndex].fb[field].why = why.value;
      autoSave();
      validateAll();
    });
    whyWrap.appendChild(why);

    function syncVisibility() {
      const v = sel.value;
      const show = (v === "bad");
      whyWrap.style.display = show ? "block" : "none";
      if (isWeight) wFix.style.display = show ? "flex" : "none";
    }

    sel.addEventListener("change", () => {
      model.rows[rowIndex].fb[field].verdict = sel.value;
      syncVisibility();
      autoSave();
      validateAll();
    });

    syncVisibility();

    td.appendChild(top);
    td.appendChild(whyWrap);
    return td;
  }

  // Buttons
  els.parseBtn.addEventListener("click", () => {
    const rows = parseInput(els.input.value);
    if (!rows.length) {
      model = { rows: [] };
      render();
      setStatus("No rows parsed. Paste TSV rows for best results.");
      return;
    }

    // Merge feedback by id (preserve fb + worksInApp)
    const existingById = new Map();
    for (const r of model.rows) existingById.set(String(r.id), r);

    const merged = rows.map(r => {
      const old = existingById.get(String(r.id));
      if (!old) return r;

      r.worksInApp = (typeof old.worksInApp === "string") ? old.worksInApp : "";
      r.fb = old.fb || r.fb;

      if (!r.fb.tag) r.fb.tag = { verdict: "", why: "" };
      if (!r.fb.description) r.fb.description = { verdict: "", why: "" };
      if (!r.fb.rationality) r.fb.rationality = { verdict: "", why: "" };
      if (!r.fb.weight) r.fb.weight = { verdict: "", why: "", corrected: "" };
      if (typeof r.fb.weight.corrected !== "string") r.fb.weight.corrected = "";

      return r;
    });

    model = { rows: merged };
    render();
    autoSave();
    validateAll();
    updateStats();
    setStatus("Parsed " + merged.length + " rows.");
  });

  els.saveBtn.addEventListener("click", saveToLocalStorage);
  els.loadBtn.addEventListener("click", loadFromLocalStorage);
  els.clearBtn.addEventListener("click", clearLocalStorage);
  els.exportBtn.addEventListener("click", exportCsv);

  // Auto-load on open
  loadFromLocalStorage();
})();
</script>
</body>
</html>
